<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green & Good - Fast Food Saludable</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navegación -->
    <nav>
        <ul>
            <li><a href="index.html">INICIO</a></li>
            <li><a href="nosotros.html">NOSOTROS</a></li>
            <li><a href="productos.html">PRODUCTOS</a></li>
            <li><a href="contacto.html">CONTACTO</a></li>
        </ul>
    </nav>

    <!-- Sección Hero -->
    <section class="hero">
        <div class="food-items">
            <!-- Bowl izquierdo -->
            <div class="food-bowl bowl-left">
                <div class="bowl-content">
                    <div class="food-item cucumber-slice"></div>
                    <div class="food-item tomato-half"></div>
                    <div class="food-item lettuce"></div>
                </div>
            </div>
            
            <!-- Bowl derecho -->
            <div class="food-bowl bowl-right">
                <div class="bowl-content">
                    <div class="food-item avocado-half"></div>
                    <div class="food-item chicken-strip"></div>
                    <div class="food-item chickpeas"></div>
                </div>
            </div>
            
            <!-- Ingredientes flotantes -->
            <div class="ingredient avocado"></div>
            <div class="ingredient tomato"></div>
            <div class="ingredient cucumber"></div>
            <div class="ingredient lime"></div>
            <div class="ingredient broccoli"></div>
            <div class="ingredient radish"></div>
        </div>
        
        <div class="hero-content">
            <h1>GREEN & GOOD</h1>
            <p>Fast food saludable · Fresco y natural</p>
        </div>
        
        <div class="wave"></div>
    </section>

    <!-- Footer -->
    <footer>
        <p>&copy; 2025 Green & Good | Diseñado por Nicole Arango | Comida rápida y saludable</p>
    </footer>
</body>
</html>
